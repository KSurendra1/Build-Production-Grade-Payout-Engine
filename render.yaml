services:
  - type: web
    name: backend-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: python manage.py runserver 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: payment-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: payment-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: payment-redis
          property: connectionString
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"

  - type: worker
    name: backend-celery-worker
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config worker -l info --pool=solo
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: payment-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: payment-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: payment-redis
          property: connectionString

  - type: worker
    name: backend-celery-beat
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config beat -l info
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: payment-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: payment-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: payment-redis
          property: connectionString

  - type: web
    name: payout-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://backend-api.onrender.com/api/v1

  - type: redis
    name: payment-redis
    ipAllowList: []

databases:
  - name: payment-db
    databaseName: payment_db
    user: payment_user
